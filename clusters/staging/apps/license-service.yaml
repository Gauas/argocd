apiVersion: apps/v1
kind: Deployment
metadata:
  name: license-service
  namespace: staging
  labels:
    app: license-service
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: license-service
  template:
    metadata:
      labels:
        app: license-service
        environment: staging
    spec:
      containers:
        - name: license-service
          image: ghcr.io/gauas/license-service:staging
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: staging
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: license-service
  namespace: staging
spec:
  selector:
    app: license-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
