---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-service
  namespace: staging
  labels:
    app: config-service
    environment: staging

---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: staging
  labels:
    app: config-service
    environment: staging
spec:
  selector:
    app: config-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: config-service
  namespace: staging
  labels:
    app: config-service
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ingressClassName: traefik
  rules:
    - host: api.gauas.com
      http:
        paths:
          - path: /api/v1/config
            pathType: Prefix
            backend:
              service:
                name: config-service
                port:
                  number: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: staging
  labels:
    app: config-service
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
        environment: staging
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "staging"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-inject-secret-config-service.env: "secret/config-service/staging"
        vault.hashicorp.com/agent-inject-template-config-service.env: |
          {{- with secret "secret/config-service/staging" -}}
          export PORT="{{ .Data.data.PORT }}"
          export DB_URL="{{ .Data.data.DB_URL }}"
          export CONFIG_SECRET_KEY="{{ .Data.data.CONFIG_SECRET_KEY }}"
          {{- end }}
    spec:
      serviceAccountName: config-service
      containers:
        - name: config-service
          image: gauaslab/config-service:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -f /vault/secrets/config-service.env ]; do
                echo "[vault-wait] Waiting for secret file to appear..."
                sleep 2
              done
              until [ -s /vault/secrets/config-service.env ]; do
                echo "[vault-wait] Secret file exists but is empty, waiting..."
                sleep 2
              done
              source /vault/secrets/config-service.env
              exec ./app
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/v1/config/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/config/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

# ─────────────────────────────────────────────────────────────────────────────
# VAULT SECRET SETUP
# Engine : secret  (KV v2)
# Path   : secret/config-service/staging
#
# Provision secrets before syncing this manifest:
#
#   vault kv put secret/config-service/staging \
#     PORT="8080" \
#     DB_URL="postgres://<user>:<password>@postgresql:5432/config_service?sslmode=disable" \
#     CONFIG_SECRET_KEY="<strong-random-secret>" \
#
# Vault policy required (staging):
#   path "secret/data/*" {
#     capabilities = ["read"]
#   }
#
# Vault Kubernetes auth role (staging):
#   bound_service_account_names      = ["*"]
#   bound_service_account_namespaces = ["staging"]
#   policies                         = ["staging"]
#   ttl                              = "1h"
# ─────────────────────────────────────────────────────────────────────────────
