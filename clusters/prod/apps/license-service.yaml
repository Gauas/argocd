apiVersion: apps/v1
kind: Deployment
metadata:
  name: license-service
  namespace: prod
  labels:
    app: license-service
    environment: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: license-service
  template:
    metadata:
      labels:
        app: license-service
        environment: prod
    spec:
      containers:
        - name: license-service
          image: ghcr.io/gauas/license-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: prod
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - license-service
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: license-service
  namespace: prod
spec:
  selector:
    app: license-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
